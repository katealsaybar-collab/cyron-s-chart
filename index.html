<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyron's Birth Chart</title>
<style>
  :root {
    --gold:#c9a84c; --gold-light:#e8d49a; --deep:#080c14;
    --parchment:#eef2f8; --muted:#6e7a8a; --rust:#2a4a8b;
    --blue:#3a6abf; --blue-dim:#1a2a4a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--deep);color:var(--parchment);
    font-family:Georgia,'Times New Roman',serif;
    min-height:100vh;
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;background:var(--gold-light);animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);}
  @keyframes twinkle{0%,100%{opacity:var(--o,.3)}50%{opacity:1}}
  .wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:48px 20px 100px;}

  /* header */
  header{text-align:center;margin-bottom:48px;}
  .eyebrow{font-family:monospace;font-size:10px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
  h1{font-size:clamp(2.2rem,8vw,3.6rem);font-weight:normal;letter-spacing:.04em;line-height:1.1;}
  h1 em{font-style:italic;color:var(--gold-light);}
  .birth-meta{font-family:monospace;font-size:10px;color:var(--muted);margin-top:12px;letter-spacing:.1em;}
  .divider{width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto;}

  /* section label */
  .section-label{font-family:monospace;font-size:9px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;text-align:center;}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-bottom:48px;}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{
    background:rgba(58,106,191,.06);
    border:1px solid rgba(201,168,76,.12);
    padding:14px 16px;
  }
  .p-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .psym{font-size:1.3rem;color:var(--gold);width:20px;text-align:center;}
  .pname{font-family:monospace;font-size:8px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
  .sign{font-size:1.05rem;color:var(--parchment);}
  .house{font-family:monospace;font-size:8px;color:var(--muted);margin-top:2px;}
  .blessed-tag{
    display:block;
    background:rgba(201,168,76,.10);
    border:1px solid rgba(201,168,76,.35);
    color:var(--gold-light);
    font-family:monospace;font-size:7px;
    letter-spacing:.1em;padding:3px 6px;
    margin-top:6px;text-transform:uppercase;
  }

  /* reading */
  .reading{border-top:1px solid rgba(201,168,76,.15);padding-top:40px;}
  .block{margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid rgba(201,168,76,.07);}
  .block:last-child{border-bottom:none;}
  .btitle{font-size:1.25rem;font-style:italic;color:var(--gold-light);margin-bottom:12px;line-height:1.3;}
  .bbody{font-size:1rem;line-height:1.85;color:rgba(238,242,248,.83);}
  .ornament{text-align:center;color:var(--gold);letter-spacing:.6em;margin:28px 0;opacity:.4;font-size:1rem;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">

  <header>
    <div class="eyebrow">Natal Chart · Whole Sign System</div>
    <h1>Cyron<br><em>Cadenas</em></h1>
    <div class="birth-meta">November 12, 1998 · 04:00 AM · Iloilo City, Philippines</div>
    <div class="divider"></div>
  </header>

  <div class="section-label">Planetary Placements</div>
  <div class="grid" id="grid"></div>

  <div class="ornament">✦ ✦ ✦</div>

  <div class="reading">
    <div class="section-label">Where You Are Blessed</div>
    <div id="reading"></div>
  </div>

</div>
<script>
// stars
const st=document.getElementById('stars');
for(let i=0;i<100;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()>.85?2:1;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*4}s;--o:${.1+Math.random()*.5};--dl:${Math.random()*5}s`;
  st.appendChild(s);
}

const placements=[
  {planet:'Sun',    symbol:'☉',sign:'Scorpio',    house:'2nd', blessed:true,  why:'Trine Jupiter'},
  {planet:'Moon',   symbol:'☽',sign:'Leo',        house:'11th',blessed:true,  why:'Trine Saturn'},
  {planet:'Rising', symbol:'↑',sign:'Libra',      house:'—',   blessed:true,  why:'Venus-ruled · charm'},
  {planet:'Mercury',symbol:'☿',sign:'Sagittarius',house:'3rd', blessed:false},
  {planet:'Venus',  symbol:'♀',sign:'Scorpio',    house:'2nd', blessed:true,  why:'Rules ASC · MC trine'},
  {planet:'Mars',   symbol:'♂',sign:'Virgo',      house:'12th',blessed:false},
  {planet:'Jupiter',symbol:'♃',sign:'Pisces',     house:'6th', blessed:true,  why:'Trine Sun · service'},
  {planet:'Saturn', symbol:'♄',sign:'Aries',      house:'7th', blessed:false},
  {planet:'Uranus', symbol:'♅',sign:'Aquarius',   house:'5th', blessed:true,  why:'Domicile · original'},
  {planet:'Neptune',symbol:'♆',sign:'Aquarius',   house:'5th', blessed:false},
  {planet:'Pluto',  symbol:'♇',sign:'Sagittarius',house:'3rd', blessed:false},
  {planet:'MC',     symbol:'⊕',sign:'Cancer',     house:'—',   blessed:true,  why:'Moon-ruled · public trust'},
];

const glyph={Aries:'♈',Taurus:'♉',Gemini:'♊',Cancer:'♋',Leo:'♌',Virgo:'♍',
             Libra:'♎',Scorpio:'♏',Sagittarius:'♐',Capricorn:'♑',Aquarius:'♒',Pisces:'♓'};

const grid=document.getElementById('grid');
placements.forEach(p=>{
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`
    <div class="p-row">
      <span class="psym">${p.symbol}</span>
      <span class="pname">${p.planet}</span>
    </div>
    <div class="sign">${glyph[p.sign]||''} ${p.sign}</div>
    <div class="house">House ${p.house}</div>
    ${p.blessed?`<span class="blessed-tag">✦ Blessed · ${p.why}</span>`:''}
  `;
  grid.appendChild(d);
});

const blessings=[
  {
    title:'Sun in Scorpio, 2nd House — Trine Jupiter',
    body:'Scorpio Sun in the 2nd house means your core identity is built around depth, value, and personal power. You don\'t just want resources — you want to <i>understand</i> them, control them, transform them. The Sun trines Jupiter at 1°03\', one of the tightest luck aspects in the chart. This is a natural amplifier: your will and your fortune are working in the same direction. What you put energy into tends to grow. The 2nd house placement means this plays out most visibly in how you earn, build, and define your own worth — on your own terms, not anyone else\'s.'
  },
  {
    title:'Venus in Scorpio, 2nd House — Rules ASC, Trines MC',
    body:'Your Libra Ascendant is ruled by Venus — and that Venus sits in Scorpio in the 2nd house. This is a chart ruler with teeth. You give off warmth and approachability on the surface (Libra rising), but beneath that is a very intentional, emotionally perceptive engine. Venus trines your Midheaven at 0°49\' — nearly exact — which means your career and public reputation are directly fed by your charm, your aesthetic sense, and your ability to form meaningful connections. People remember you. That\'s not an accident, that\'s the chart.'
  },
  {
    title:'Jupiter in Pisces, 6th House — Service & Expansion',
    body:'Jupiter in Pisces is a classic placement for someone who genuinely wants to be useful. The 6th house governs daily work, service, and health — Jupiter here expands your capacity and your luck in those areas. You\'re the kind of person who uplifts the people you work with without making a big deal of it. The trine to your Sun means this isn\'t a struggle — service comes naturally, and it tends to bring you more than you expect in return. The shadow: you can over-give and end up resentful when others don\'t match your investment. Worth watching.'
  },
  {
    title:'Moon in Leo, 11th House — Trine Saturn (0°02\')',
    body:'This is one of the most precise aspects in the chart — Moon trine Saturn at nearly exact orb. Your emotional world and your sense of structure are in deep alignment. You don\'t just feel things; you hold them. You know how to sit with discomfort and build through it rather than being swept away. The Moon in Leo in the 11th means you find genuine emotional nourishment in community, in being seen within your groups, in contributing to something bigger than yourself. The Saturn trine grounds that Leo need for recognition into something lasting — you\'re not just chasing applause, you\'re building a legacy.'
  }
];

const out=document.getElementById('reading');
blessings.forEach(b=>{
  const div=document.createElement('div');div.className='block';
  div.innerHTML=`<div class="btitle">${b.title}</div><div class="bbody">${b.body}</div>`;
  out.appendChild(div);
});
</script>
</body>
</html>
